<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="200" fill="#050505" rx="20"/>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:cyan;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:cyan;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:cyan;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <!-- Animated glow line -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="url(#g)" stroke-width="2">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" />
  </line>
  <!-- Text -->
  <text x="400" y="115" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="white" text-anchor="middle" letter-spacing="10">
    MAKIMA <tspan fill="cyan">AVATAR</tspan>
  </text>
  <text x="400" y="150" font-family="Inter, sans-serif" font-size="14" fill="#666" text-anchor="middle" letter-spacing="2">
    XYZ RAINBOW TECHNOLOGY • AI POWERED
  </text>
</svg>
